<%+header%>
<h2 name="content"><%:SQM Controller Log%></h2>

<div class="cbi-section">
    <div class="cbi-section-descr">
        <%:View the latest logs from SQM Controller.%>
    </div>
    
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Log File%></label>
        <div class="cbi-value-field">
            <input type="text" class="cbi-input-text" value="/var/log/sqm-controller.log" id="log-path" readonly style="width: 300px;" />
            <button class="cbi-button cbi-button-apply" id="refresh-log"><%:Refresh%></button>
            <button class="cbi-button cbi-button-reset" id="clear-log"><%:Clear Log%></button>
        </div>
    </div>
    
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Log Lines%></label>
        <div class="cbi-value-field">
            <select class="cbi-input-select" id="log-lines">
                <option value="50">50 lines</option>
                <option value="100" selected>100 lines</option>
                <option value="200">200 lines</option>
                <option value="500">500 lines</option>
                <option value="all">All lines</option>
            </select>
        </div>
    </div>
</div>

<div class="cbi-section">
    <div class="table-wrapper">
        <table class="table">
            <tr>
                <th style="width: 120px;"><%:Time%></th>
                <th><%:Level%></th>
                <th><%:Message%></th>
            </tr>
            <tbody id="log-content">
                <tr><td colspan="3"><%:Loading log data...%></td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="text/javascript">
(function() {
    function loadLog() {
        var lines = document.getElementById('log-lines').value;
        XHR.get('<%=url("admin/services/sqm-controller/getlog")%>', {
            lines: lines
        }, function(xhr, status) {
            if (status === 200) {
                var data = JSON.parse(xhr.responseText);
                var tbody = document.getElementById('log-content');
                tbody.innerHTML = '';
                
                if (data.logs && data.logs.length > 0) {
                    data.logs.forEach(function(log) {
                        var row = document.createElement('tr');
                        
                        var timeCell = document.createElement('td');
                        timeCell.textContent = log.time;
                        row.appendChild(timeCell);
                        
                        var levelCell = document.createElement('td');
                        levelCell.textContent = log.level;
                        levelCell.className = 'log-level-' + log.level.toLowerCase();
                        row.appendChild(levelCell);
                        
                        var msgCell = document.createElement('td');
                        msgCell.textContent = log.message;
                        row.appendChild(msgCell);
                        
                        tbody.appendChild(row);
                    });
                } else {
                    var row = document.createElement('tr');
                    var cell = document.createElement('td');
                    cell.colSpan = 3;
                    cell.textContent = '<%:No log entries found%>';
                    row.appendChild(cell);
                    tbody.appendChild(row);
                }
            }
        });
    }
    
    function clearLog() {
        if (confirm('<%:Are you sure you want to clear the log file?%>')) {
            XHR.post('<%=url("admin/services/sqm-controller/clearlog")%>', {}, function(xhr, status) {
                if (status === 200) {
                    alert('<%:Log cleared successfully%>');
                    loadLog();
                }
            });
        }
    }
    
    // 绑定事件
    document.getElementById('refresh-log').onclick = loadLog;
    document.getElementById('clear-log').onclick = clearLog;
    document.getElementById('log-lines').onchange = loadLog;
    
    // 初始加载
    loadLog();
    // 每10秒自动刷新
    setInterval(loadLog, 10000);
})();
</script>

<style type="text/css">
.log-level-debug { color: #666; }
.log-level-info { color: #333; }
.log-level-warning { color: #ff9900; }
.log-level-error { color: #ff0000; font-weight: bold; }
</style>

<%+footer%>
