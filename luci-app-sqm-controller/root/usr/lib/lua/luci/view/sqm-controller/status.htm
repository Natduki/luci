<%+header%>
<h2 name="content"><%:SQM Controller Status%></h2>

<div class="cbi-section">
    <h3><%:Service Status%></h3>
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Status%></label>
        <div class="cbi-value-field">
            <span id="service-status">Loading...</span>
        </div>
    </div>
    
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Interface%></label>
        <div class="cbi-value-field">
            <span id="interface-name">-</span>
        </div>
    </div>
    
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Download Speed%></label>
        <div class="cbi-value-field">
            <span id="download-speed">-</span>
        </div>
    </div>
    
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Upload Speed%></label>
        <div class="cbi-value-field">
            <span id="upload-speed">-</span>
        </div>
    </div>
</div>

<div class="cbi-section">
    <h3><%:Traffic Statistics%></h3>
    <div class="table-wrapper">
        <table class="table">
            <tr>
                <th><%:Direction%></th>
                <th><%:Packets%></th>
                <th><%:Bytes%></th>
                <th><%:Rate%></th>
            </tr>
            <tr>
                <td><%:Download%></td>
                <td id="down-packets">-</td>
                <td id="down-bytes">-</td>
                <td id="down-rate">-</td>
            </tr>
            <tr>
                <td><%:Upload%></td>
                <td id="up-packets">-</td>
                <td id="up-bytes">-</td>
                <td id="up-rate">-</td>
            </tr>
        </table>
    </div>
</div>

<div class="cbi-section">
    <h3><%:Actions%></h3>
    <div class="cbi-value">
        <label class="cbi-value-title"><%:Control%></label>
        <div class="cbi-value-field">
            <button class="cbi-button cbi-button-action" id="start-btn"><%:Start%></button>
            <button class="cbi-button cbi-button-reset" id="stop-btn"><%:Stop%></button>
            <button class="cbi-button cbi-button-apply" id="restart-btn"><%:Restart%></button>
            <button class="cbi-button" id="refresh-btn"><%:Refresh%></button>
        </div>
    </div>
</div>

<script type="text/javascript">
(function() {
    function updateStatus() {
        XHR.get('<%=luci.dispatcher.build_url("admin/services/sqm-controller/action")%>', {
            action: 'status'
        }, function(xhr, status) {
            if (status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (data.success) {
                        // 解析状态数据并更新UI
                        // 这里需要根据实际状态脚本的输出格式进行解析
                        document.getElementById('service-status').innerHTML = 'Running';
                        document.getElementById('service-status').style.color = 'green';
                    } else {
                        document.getElementById('service-status').innerHTML = 'Stopped';
                        document.getElementById('service-status').style.color = 'red';
                    }
                } catch(e) {
                    document.getElementById('service-status').innerHTML = 'Error';
                }
            }
        });
    }
    
    function performAction(action) {
        XHR.post('<%=luci.dispatcher.build_url("admin/services/sqm-controller/action")%>', {
            action: action
        }, function(xhr, status) {
            if (status === 200) {
                var data = JSON.parse(xhr.responseText);
                alert(data.message);
                updateStatus();
            }
        });
    }
    
    // 绑定按钮事件
    document.getElementById('start-btn').onclick = function() { performAction('start'); };
    document.getElementById('stop-btn').onclick = function() { performAction('stop'); };
    document.getElementById('restart-btn').onclick = function() { performAction('restart'); };
    document.getElementById('refresh-btn').onclick = updateStatus;
    
    // 初始加载状态
    updateStatus();
    // 每30秒自动刷新
    setInterval(updateStatus, 30000);
})();
</script>

<%+footer%>
