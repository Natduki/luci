<div class="cbi-page-actions">
    <input type="submit" class="cbi-button cbi-button-apply" value="<%:Save & Apply%>" />
    <input type="reset" class="cbi-button cbi-button-reset" value="<%:Reset%>" />
    <input type="button" class="cbi-button" onclick="location.href='<%=luci.dispatcher.build_url("admin/services/sqm-controller/status")%>'" value="<%:Back to Status%>" />
</div>

<script type="text/javascript">
// 显示保存确认
document.querySelector('form').onsubmit = function() {
    return confirm('<%:Are you sure you want to save these settings? The SQM Controller will be restarted.%>');
};
</script>
