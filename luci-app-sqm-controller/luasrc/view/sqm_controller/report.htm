<%+header%>

<style>
.sqm-wrap { max-width: 1200px; }
.sqm-topbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:8px 0 12px; }
.sqm-title { margin:0; font-size:22px; }
.sqm-card { border:1px solid #e5e5e5; border-radius:8px; padding:12px; background:#fff; margin-bottom:12px; }
.sqm-badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; color:#fff; background:#777; }
.sqm-badge.ok { background:#2e7d32; }
.sqm-badge.warn { background:#ed6c02; }
.sqm-badge.bad { background:#d32f2f; }
.sqm-table { width:100%; border-collapse:collapse; }
.sqm-table th, .sqm-table td { border-bottom:1px solid #eee; text-align:left; padding:6px; font-size:13px; }
.sqm-note { color:#666; font-size:12px; }
.sqm-pre { border:1px solid #e5e5e5; border-radius:8px; background:#fafafa; padding:10px; max-height:260px; overflow:auto; margin:0; }
</style>

<div class="cbi-map sqm-wrap">
  <h2 class="sqm-title">策略报告导出</h2>

  <div class="sqm-topbar">
    <button id="btn-csv" class="cbi-button cbi-button-apply">导出 CSV</button>
    <button id="btn-json" class="cbi-button">导出 JSON</button>
    <button id="btn-preview" class="cbi-button">预览最近记录</button>
    <span id="preview-badge" class="sqm-badge warn">--</span>
  </div>

  <div class="sqm-card">
    <div class="sqm-note">预览条数: <span id="preview-count">--</span></div>
    <div class="sqm-note" id="preview-msg">点击“预览最近记录”加载数据</div>
  </div>

  <div class="sqm-card">
    <table class="sqm-table">
      <thead>
        <tr>
          <th>时间</th>
          <th>策略模式</th>
          <th>判定原因</th>
          <th>是否调整</th>
        </tr>
      </thead>
      <tbody id="preview-tbody">
        <tr><td colspan="4">--</td></tr>
      </tbody>
    </table>
  </div>

  <div class="sqm-card">
    <div class="sqm-note">原始预览</div>
    <pre id="raw-pre" class="sqm-pre">--</pre>
  </div>
</div>

<script type="text/javascript">
(function() {
  var EXPORT_URL = '<%=luci.dispatcher.build_url("admin/services/sqm_controller/export_report")%>';
  var MODE_LABELS = {
    gaming: "游戏优先",
    streaming: "流媒体优先",
    bulk: "批量传输优先",
    other: "默认",
    disabled: "已禁用",
    auto: "自动"
  };
  var REASON_LABELS = {
    "severe congestion": "严重拥塞",
    "policy disabled": "策略已禁用",
    "no state yet": "暂无状态"
  };

  function el(id) { return document.getElementById(id); }
  function qUrl(fmt) { return EXPORT_URL + "?format=" + encodeURIComponent(fmt); }
  function setBadge(kind, text) {
    var node = el("preview-badge");
    node.className = "sqm-badge " + kind;
    node.textContent = text;
  }
  function safeText(v) {
    if (v === null || v === undefined || v === "") return "--";
    return String(v);
  }
  function displayMode(v) {
    var text = safeText(v);
    return MODE_LABELS[text] || text;
  }
  function displayReason(v) {
    var text = safeText(v);
    return REASON_LABELS[text] || text;
  }
  function fmtTs(v) {
    var n = Number(v);
    if (!isFinite(n) || n <= 0) return "--";
    try { return new Date(n * 1000).toLocaleString(); } catch (e) { return "--"; }
  }
  function clearRows(msg) {
    var tb = el("preview-tbody");
    tb.innerHTML = "";
    var tr = document.createElement("tr");
    var td = document.createElement("td");
    td.colSpan = 4;
    td.textContent = msg || "--";
    tr.appendChild(td);
    tb.appendChild(tr);
  }
  function row(timeText, mode, reason, changed) {
    var tr = document.createElement("tr");
    [timeText, mode, reason, changed].forEach(function(v) {
      var td = document.createElement("td");
      td.textContent = safeText(v);
      tr.appendChild(td);
    });
    return tr;
  }
  function asEntries(data) {
    if (Array.isArray(data)) return data;
    if (!data || typeof data !== "object") return null;
    if (Array.isArray(data.entries)) return data.entries;
    if (Array.isArray(data.logs)) return data.logs;
    if (Array.isArray(data.data)) return data.data;
    return null;
  }
  function toBoolText(v) {
    if (typeof v === "boolean") return v ? "是" : "否";
    return "--";
  }
  function preview() {
    el("preview-msg").textContent = "加载中...";
    fetch(qUrl("json"), { cache: "no-store" })
      .then(function(resp) {
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return resp.text();
      })
      .then(function(raw) {
        var text = raw || "";
        el("raw-pre").textContent = text.slice(0, 4000) || "--";

        var data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("无法解析 JSON 预览，请下载查看");
        }

        var entries = asEntries(data);
        if (!entries) throw new Error("JSON 结构不支持预览，请下载查看");

        el("preview-count").textContent = String(entries.length);
        var tb = el("preview-tbody");
        tb.innerHTML = "";
        if (!entries.length) {
          clearRows("暂无记录");
        } else {
          var top = entries.slice(0, 5);
          top.forEach(function(item) {
            item = (item && typeof item === "object") ? item : {};
            var decision = (item.decision && typeof item.decision === "object") ? item.decision : {};
            tb.appendChild(row(
              safeText(fmtTs(item.time)),
              displayMode(decision.mode),
              displayReason(decision.reason),
              toBoolText(item.changed)
            ));
          });
        }

        setBadge("ok", "正常");
        el("preview-msg").textContent = "预览成功（最多展示前 5 条）";
      })
      .catch(function(err) {
        clearRows("无法预览，请下载查看");
        setBadge("warn", "警告");
        el("preview-count").textContent = "--";
        el("preview-msg").textContent = (err && err.message) ? err.message : "预览失败";
      });
  }

  el("btn-csv").addEventListener("click", function() {
    window.location.href = qUrl("csv");
  });
  el("btn-json").addEventListener("click", function() {
    window.open(qUrl("json"), "_blank");
  });
  el("btn-preview").addEventListener("click", preview);

  setBadge("warn", "空闲");
})();
</script>

<%+footer%>
